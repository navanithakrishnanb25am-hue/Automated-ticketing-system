<!DOCTYPE html>
<html>
<head>

<title>AI Writing Analyzer</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#eef2f7;
overflow-x:hidden;
}

/* PAGE BACKGROUND ANIMATION */

.background{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
overflow:hidden;
}

.page{
position:absolute;
width:80px;
height:100px;
background:white;
border-radius:4px;
box-shadow:0 5px 10px rgba(0,0,0,0.2);
animation:floatPage linear infinite;
opacity:0.7;
}

@keyframes floatPage{

0%{
transform:translateY(100vh) rotate(0deg);
}

100%{
transform:translateY(-200px) rotate(360deg);
}

}

.page:before{
content:"";
position:absolute;
left:10px;
top:15px;
width:60px;
height:2px;
background:#ccc;
box-shadow:
0 10px #ccc,
0 20px #ccc,
0 30px #ccc,
0 40px #ccc;
}

/* LAYOUT */

.container{
display:flex;
}

.sidebar{
width:220px;
background:#1f2937;
color:white;
height:100vh;
padding:20px;
}

.sidebar button{
width:100%;
padding:10px;
margin:6px 0;
background:#3b82f6;
border:none;
color:white;
cursor:pointer;
}

.main{
flex:1;
padding:25px;
}

textarea{
width:100%;
height:150px;
padding:10px;
}

.section{
display:none;
background:white;
padding:15px;
margin-top:15px;
border-radius:8px;
}

.active{
display:block;
}

.dashboard{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
}

.card{
background:#f3f4f6;
padding:10px;
text-align:center;
border-radius:6px;
}

p{
line-height:1.7;
}

ul{
margin-left:20px;
}

</style>
</head>

<body>

<div class="background" id="background"></div>

<div class="container">

<div class="sidebar">

<h2>Writing AI</h2>

<button onclick="openTab('analysis')">Analysis</button>
<button onclick="openTab('summary')">Summary</button>
<button onclick="openTab('corrected')">Corrected</button>
<button onclick="openTab('improved')">Improved</button>
<button onclick="openTab('charts')">Charts</button>

</div>

<div class="main">

<h1>Professional Writing Analyzer</h1>

<textarea id="textInput" placeholder="Paste essay, report, journal or resume"></textarea>

<br><br>

<input type="file" id="fileInput">
<button onclick="loadFile()">Upload File</button>

<br><br>

<button onclick="analyze()">Analyze Document</button>

<div id="analysis" class="section active">

<div class="dashboard">

<div class="card"><h3 id="grammarScore">0</h3>Grammar</div>
<div class="card"><h3 id="structureScore">0</h3>Structure</div>
<div class="card"><h3 id="ideaScore">0</h3>Ideas</div>
<div class="card"><h3 id="clarityScore">0</h3>Clarity</div>
<div class="card"><h3 id="totalScore">0</h3>Total</div>

</div>

</div>

<div id="summary" class="section"></div>

<div id="corrected" class="section">
<h2>Corrected Version</h2>
<div id="correctedContent"></div>

<br>
<button onclick="downloadPDF('correctedContent','Corrected_Document')">
Download Corrected PDF
</button>
</div>

<div id="improved" class="section">
<h2>Improved Version</h2>
<div id="improvedContent"></div>

<br>
<button onclick="downloadPDF('improvedContent','Improved_Document')">
Download Improved PDF
</button>
</div>

<div id="charts" class="section">

<canvas id="radarChart"></canvas>
<br>
<canvas id="barChart"></canvas>

</div>

</div>
</div>

<script>

/* PAGE BACKGROUND ANIMATION */

for(let i=0;i<25;i++){

let page=document.createElement("div")
page.className="page"

page.style.left=Math.random()*100+"%"
page.style.animationDuration=(8+Math.random()*10)+"s"
page.style.animationDelay=Math.random()*5+"s"

document.getElementById("background").appendChild(page)

}

/* TAB SYSTEM */

function openTab(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

/* FILE LOADING */

function loadFile(){

let file=document.getElementById("fileInput").files[0]

let reader=new FileReader()

if(file.name.endsWith(".txt")){
reader.onload=e=>textInput.value=e.target.result
reader.readAsText(file)
}

else if(file.name.endsWith(".docx")){

reader.onload=e=>{
mammoth.extractRawText({arrayBuffer:e.target.result})
.then(res=>{
textInput.value=res.value
})
}

reader.readAsArrayBuffer(file)

}

else if(file.name.endsWith(".pdf")){

reader.onload=e=>{

let typed=new Uint8Array(e.target.result)

pdfjsLib.getDocument(typed).promise.then(pdf=>{

let pages=[]

for(let i=1;i<=pdf.numPages;i++){

pages.push(
pdf.getPage(i).then(page=>{
return page.getTextContent().then(content=>{
return content.items.map(item=>item.str).join(" ")
})
})
)

}

Promise.all(pages).then(res=>{
textInput.value=res.join("\n\n")
})

})

}

reader.readAsArrayBuffer(file)

}

}

/* STRUCTURE FORMATTER */

function formatStructure(text){

let lines=text.split(/\n+/)

let html=""

lines.forEach(line=>{

line=line.trim()

if(line.length<1) return

if(/^[A-Z\s]{5,}$/.test(line)){
html+="<h2>"+line+"</h2>"
}

else if(line.startsWith("-")||line.startsWith("•")){
html+="<ul><li>"+line.substring(1)+"</li></ul>"
}

else{
html+="<p>"+line+"</p>"
}

})

return html

}

/* CORRECTED VERSION */

function correctGrammar(text){

text=text.replace(/\bI has\b/gi,"I have")
text=text.replace(/\bhe go\b/gi,"he goes")
text=text.replace(/\bshe go\b/gi,"she goes")
text=text.replace(/\bthey is\b/gi,"they are")

return text

}

/* IMPROVED VERSION */

function improveWriting(text){

let improved=text

improved=improved.replace(/\bvery\b/gi,"extremely")
improved=improved.replace(/\ba lot\b/gi,"a considerable amount")
improved=improved.replace(/\bbig\b/gi,"substantial")
improved=improved.replace(/because/g,"due to the fact that")

return improved

}

/* SUMMARY */

function summarize(text){

let sentences=text.match(/[^.!?]+[.!?]/g)

if(!sentences) return text

return sentences.slice(0,3).join(" ")

}

/* SCORING */

function score(text){

let words=text.split(/\s+/).length
let sentences=text.split(/[.!?]/).length

let avg=words/sentences

return{
grammar:Math.round(100-avg*1.5),
structure:Math.min(100,60+sentences),
clarity:Math.round(100-avg),
ideas:Math.min(95,50+words/25)
}

}

/* ANALYZE */

function analyze(){

let text=textInput.value

let scores=score(text)

grammarScore.innerText=scores.grammar
structureScore.innerText=scores.structure
clarityScore.innerText=scores.clarity
ideaScore.innerText=scores.ideas

totalScore.innerText=Math.round(
(scores.grammar+scores.structure+scores.clarity+scores.ideas)/4
)

let correctedText=correctGrammar(text)
let improvedText=improveWriting(correctedText)

summary.innerHTML="<h2>Summary</h2>"+formatStructure(summarize(text))

correctedContent.innerHTML=formatStructure(correctedText)

improvedContent.innerHTML=formatStructure(improvedText)

drawCharts(scores)

}

/* CHARTS */

function drawCharts(scores){

if(window.radar) radar.destroy()
if(window.bar) bar.destroy()

radar=new Chart(document.getElementById("radarChart"),{
type:"radar",
data:{
labels:["Grammar","Structure","Ideas","Clarity"],
datasets:[{data:[
scores.grammar,
scores.structure,
scores.ideas,
scores.clarity
]}]
}
})

bar=new Chart(document.getElementById("barChart"),{
type:"bar",
data:{
labels:["Grammar","Structure","Ideas","Clarity"],
datasets:[{data:[
scores.grammar,
scores.structure,
scores.ideas,
scores.clarity
]}]
}
})

}

/* PDF DOWNLOAD */

function downloadPDF(elementId,fileName){

const { jsPDF } = window.jspdf

let doc = new jsPDF()

let text = document.getElementById(elementId).innerText

let lines = doc.splitTextToSize(text,180)

doc.text(lines,10,10)

doc.save(fileName+".pdf")

}

</script>

</body>
</html>
